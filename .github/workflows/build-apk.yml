name: Build & Release APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: [self-hosted, fedora42]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci --ignore-scripts || npm install

      - name: Build Angular app
        run: npx ng build --configuration production

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Get short commit hash
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/office-aschi-${{ steps.vars.outputs.sha_short }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.vars.outputs.sha_short }}
          name: Office Aschi APK (${{ steps.vars.outputs.sha_short }})
          body: |
            Debug APK built from commit `${{ github.sha }}`
            Branch: `${{ github.ref_name }}`
            Triggered by: `${{ github.actor }}`
          files: android/app/build/outputs/apk/debug/office-aschi-${{ steps.vars.outputs.sha_short }}.apk
